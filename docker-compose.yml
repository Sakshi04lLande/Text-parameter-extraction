services:
  psychological-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: psychological-api

    ports:
      - "8025:8025"

    env_file:
      - .env

    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"